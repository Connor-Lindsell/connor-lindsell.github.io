<!-- _includes/navbar.html -->
<nav class="site-nav">
    <div class="site-nav__inner container">
        <a href="/" class="site-nav__brand">{{ site.name }}</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-links">
            <i class="fa-solid fa-bars"></i>
            <span class="visually-hidden">Toggle menu</span>
        </button>

        <div class="site-nav__links" id="site-nav-links">
            <a href="/"{% if page.url == "/" %} class="is-active"{% endif %}>Home</a>
            <a href="/projects/"{% if page.url contains "/projects/" %} class="is-active"{% endif %}>Projects</a>
            <a href="/about/"{% if page.url contains "/about/" %} class="is-active"{% endif %}>About</a>
            <a href="{{ site.resume-url }}" target="_blank" rel="noopener noreferrer">Resume <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i></a>
        </div>
    </div>
</nav>
