<div class="timeline">
  {% for entry in site.data.experience %}
    <div class="timeline__entry reveal">
      <div class="timeline__date mono">{{ entry.date_range }}</div>
      <div class="timeline__content">
        <h3 class="timeline__title">{{ entry.title }}</h3>
        <span class="timeline__org">{{ entry.org }} <span class="chip">{{ entry.type | upcase }}</span></span>
        <div class="timeline__body">
          <p>{{ entry.summary }}</p>
          {% if entry.bullets %}
            <ul>
              {% for bullet in entry.bullets %}
                <li>{{ bullet }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        </div>
      </div>
    </div>
  {% endfor %}
</div>
